services:
  - type: web
    name: sclera-academic-platform
    env: python
    buildCommand: pip install -r requirements_sclera.txt
    startCommand: gunicorn --workers 3 --threads 100 --bind 0.0.0.0:$PORT wsgi_sclera:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true